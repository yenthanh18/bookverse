<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookVerse Admin - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0">
        <div class="h-20 flex items-center px-6 border-b border-slate-800">
            <h1 class="text-xl font-black text-white">BookVerse Admin</h1>
        </div>
        <nav class="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
            <a href="{{ url_for('admin_bp.dashboard') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl {% if request.endpoint == 'admin_bp.dashboard' %}bg-brand-orangeAccent text-white{% else %}hover:bg-slate-800 hover:text-white{% endif %} transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Dashboard
            </a>
            <a href="{{ url_for('admin_bp.manage_orders') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl {% if request.endpoint == 'admin_bp.manage_orders' %}bg-brand-orangeAccent text-white{% else %}hover:bg-slate-800 hover:text-white{% endif %} transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                Orders
            </a>
            <a href="{{ url_for('admin_bp.manage_books') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl {% if request.endpoint == 'admin_bp.manage_books' %}bg-brand-orangeAccent text-white{% else %}hover:bg-slate-800 hover:text-white{% endif %} transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                Books
            </a>
            <a href="{{ url_for('public_bp.index') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-colors mt-auto">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Store
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10">
            <h2 class="text-2xl font-bold text-slate-800">{% block header_title %}{% endblock %}</h2>
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-brand-orangeAccent rounded-full flex items-center justify-center text-white font-bold">
                    A
                </div>
            </div>
        </header>
        
        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-8 bg-slate-50">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <!-- Config for Tailwind Colors from user specifications -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            deepBlue: '#15335E',
                            orangeAccent: '#F3752A',
                            warmBeige: '#F8F1EB'
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
