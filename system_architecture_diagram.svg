<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #4b5563; }
      .layerTitle { font: 700 20px Arial, sans-serif; fill: #111827; }
      .boxTitle { font: 700 18px Arial, sans-serif; fill: #111827; }
      .boxText { font: 14px Arial, sans-serif; fill: #374151; }
      .small { font: 13px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .db { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; }
      .ai { fill: #ecfeff; stroke: #06b6d4; stroke-width: 2; }
      .service { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
      .front { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .note { fill: #f8fafc; stroke: #94a3b8; stroke-dasharray: 6 5; stroke-width: 1.5; }
      .layer { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 24; ry: 24; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <text x="800" y="50" text-anchor="middle" class="title">Smart Book E-commerce System Architecture</text>
  <text x="800" y="78" text-anchor="middle" class="subtitle">Personalized Recommendation + Semantic Chatbot + Flask API + Web Demo</text>

  <rect x="60" y="120" width="1480" height="180" class="layer"/>
  <text x="90" y="155" class="layerTitle">1. Data Layer</text>

  <rect x="100" y="180" width="290" height="90" rx="18" class="db"/>
  <text x="245" y="212" text-anchor="middle" class="boxTitle">Goodbooks-10k</text>
  <text x="245" y="236" text-anchor="middle" class="boxText">books.csv, ratings.csv, tags.csv</text>
  <text x="245" y="256" text-anchor="middle" class="small">Main catalog + recommendation data</text>

  <rect x="430" y="180" width="290" height="90" rx="18" class="db"/>
  <text x="575" y="212" text-anchor="middle" class="boxTitle">Goodreads 100k</text>
  <text x="575" y="236" text-anchor="middle" class="boxText">title, author, desc, genre</text>
  <text x="575" y="256" text-anchor="middle" class="small">Content enrichment for chatbot</text>

  <rect x="760" y="180" width="360" height="90" rx="18" class="db"/>
  <text x="940" y="212" text-anchor="middle" class="boxTitle">Merged Outputs</text>
  <text x="940" y="236" text-anchor="middle" class="boxText">books_web_v2.csv • books_chatbot_v2.csv</text>
  <text x="940" y="256" text-anchor="middle" class="small">Website catalog + chatbot corpus</text>

  <rect x="1160" y="180" width="340" height="90" rx="18" class="db"/>
  <text x="1330" y="212" text-anchor="middle" class="boxTitle">Model Artifacts</text>
  <text x="1330" y="236" text-anchor="middle" class="boxText">item_similarity.pkl • chatbot_vectorizer.pkl</text>
  <text x="1330" y="256" text-anchor="middle" class="small">Reusable models for backend API</text>

  <rect x="60" y="340" width="1480" height="220" class="layer"/>
  <text x="90" y="375" class="layerTitle">2. AI Layer</text>

  <rect x="110" y="410" width="420" height="110" rx="20" class="ai"/>
  <text x="320" y="444" text-anchor="middle" class="boxTitle">Recommendation Engine</text>
  <text x="320" y="470" text-anchor="middle" class="boxText">Item-based Collaborative Filtering</text>
  <text x="320" y="492" text-anchor="middle" class="boxText">Cosine similarity on user-item matrix</text>
  <text x="320" y="514" text-anchor="middle" class="small">Similar books • personalized recs • popular fallback</text>

  <rect x="590" y="410" width="420" height="110" rx="20" class="ai"/>
  <text x="800" y="444" text-anchor="middle" class="boxTitle">Semantic Chatbot Engine</text>
  <text x="800" y="470" text-anchor="middle" class="boxText">TF-IDF + Cosine Similarity</text>
  <text x="800" y="492" text-anchor="middle" class="boxText">Natural-language book search</text>
  <text x="800" y="514" text-anchor="middle" class="small">Uses title + author + genre + description</text>

  <rect x="1070" y="410" width="390" height="110" rx="20" class="ai"/>
  <text x="1265" y="444" text-anchor="middle" class="boxTitle">Rule-based Discovery Layer</text>
  <text x="1265" y="470" text-anchor="middle" class="boxText">Same-author search</text>
  <text x="1265" y="492" text-anchor="middle" class="boxText">Similar books by title</text>
  <text x="1265" y="514" text-anchor="middle" class="small">Explainable browsing and cross-selling support</text>

  <rect x="60" y="600" width="1480" height="170" class="layer"/>
  <text x="90" y="635" class="layerTitle">3. Service Layer</text>

  <rect x="220" y="665" width="1160" height="75" rx="20" class="service"/>
  <text x="800" y="698" text-anchor="middle" class="boxTitle">Flask REST API</text>
  <text x="800" y="722" text-anchor="middle" class="boxText">/chatbot/reply • /chatbot/search • /chatbot/author • /chatbot/similar • /recommend/user • /recommend/similar • /recommend/popular</text>

  <rect x="60" y="810" width="1480" height="130" class="layer"/>
  <text x="90" y="845" class="layerTitle">4. Presentation Layer</text>

  <rect x="220" y="860" width="1160" height="50" rx="18" class="front"/>
  <text x="800" y="892" text-anchor="middle" class="boxTitle">Bookstore Web Interface</text>
  <text x="800" y="912" text-anchor="middle" class="small">Search books • browse recommendations • chat with AI assistant • discover books by title or author</text>

  <rect x="1210" y="345" width="280" height="195" rx="16" class="note"/>
  <text x="1230" y="372" class="boxTitle">Project Logic</text>
  <text x="1230" y="400" class="boxText">• Website keeps full 10,000-book catalog</text>
  <text x="1230" y="425" class="boxText">• Recommendation uses rating history</text>
  <text x="1230" y="450" class="boxText">• Chatbot uses enriched subset</text>
  <text x="1230" y="475" class="boxText">• Same-author improves discoverability</text>
  <text x="1230" y="500" class="boxText">• API can be connected to any frontend</text>

  <line x1="245" y1="270" x2="245" y2="410" class="arrow"/>
  <line x1="575" y1="270" x2="800" y2="410" class="arrow"/>
  <line x1="940" y1="270" x2="320" y2="410" class="arrow"/>
  <line x1="940" y1="270" x2="800" y2="410" class="arrow"/>
  <line x1="940" y1="270" x2="1265" y2="410" class="arrow"/>
  <line x1="1330" y1="270" x2="1330" y2="410" class="arrow"/>
  <line x1="320" y1="520" x2="520" y2="665" class="arrow"/>
  <line x1="800" y1="520" x2="800" y2="665" class="arrow"/>
  <line x1="1265" y1="520" x2="1080" y2="665" class="arrow"/>
  <line x1="800" y1="740" x2="800" y2="860" class="arrow"/>
</svg>
